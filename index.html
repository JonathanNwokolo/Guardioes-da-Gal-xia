<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Guardiões da Galáxia</title>

    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />

    <link rel="stylesheet" href="./styles/global.css" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="member__image-wrapper">
      <div class="member__image-overlay"></div>
      <img
        id="member__image"
        src="./assets/members/peter-quill.png"
        alt="Peter Quill"
      />

      <img src="./assets/logo.png" alt="Guardiões da Galáxia" class="logo" />

      <h1 id="member__name" class="peter" data-value="Peter Quill">
        Peter Quill
      </h1>
    </div>

    <aside class="sidebar" id="sidebar">
      <button class="sidebar__close" id="closeSidebar">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41z"
          />
        </svg>
      </button>

      <h2 class="sidebar__title">Personagens</h2>

      <div class="member__cards" id="cards">
        
      </div>
    </aside>

    <button class="menu__toggle" id="menuToggle">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="32"
        height="32"
        viewBox="0 0 24 24"
      >
        <path
          fill="currentColor"
          d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"
        />
      </svg>
    </button>

    <script src="./script/index.js"></script>
    <script src="./script/changeName.js"></script>
  </body>
</html>
